- name: create ec2 and r53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-0d5d4fedeb7568090
    ami_id: ami-0220d79f3f480ecf5
    domain_name: devzone.fun
    env: dev
    instance_action: create
    instances:
      - mongodb
      - catalogue
  tasks:
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        instance_type: t3.micro
        image_id: "{{ ami_id  }}"
        security_group: "{{ sg_id }}"
        name: "{{ item }}-{{ env }}"
        tags:
         project: roboshop
         component: "{{ item }}"
         Environment: "{{ env }}"
         Name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}" 
      register: ec2_output
      when: instance_action == 'create'

    - name: print the output
      ansible.builtin.debug:
       msg: "{{ ec2_output }}"
      when: instance_action == 'create'

    
    - name: create r53 record
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}-{{ env }}.{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        wait: false
      loop: "{{ ec2_output.results }}"
      when: instance_action == 'create'

    - name: create r53 record for frontend
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "roboshop-{{ env }}.{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].public_ip_address }}"
        wait: false
      loop: "{{ ec2_output.results }}"
      when:
      - item.item == "frontend"
      - instance_action == "create"